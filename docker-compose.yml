version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: supergeheim
      MYSQL_DATABASE: phples
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_ui
    restart: always
    ports:
      - "6969:80"
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=db
    depends_on:
      - db

  website:
    image: php:8.2-apache
    container_name: mijn_website
    restart: always
    ports:
      - "6767:80"
    volumes:
      - .:/var/www/html
    entrypoint: [ "sh", "-c", "docker-php-ext-install mysqli && apache2-foreground" ]
    depends_on:
      - db